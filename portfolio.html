<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="intro">
        <h1>Welcome to My Portfolio</h1>
        <p>Hello! I'm Sohaib, a passionate web designer who loves crafting elegant and responsive websites.</p>
    </header>

    <section class="skills">
        <h2>★ My Skills</h2>
        <div class="skill-list">
            <span class="skill">HTML & CSS</span>
            <span class="skill">JavaScript</span>
            <span class="skill">React</span>
        </div>
    </section>

    <section class="projects">
        <h2>★ My Projects</h2>
        <ul>
            <li class="project-item">Portfolio Website</li>
            <li class="project-item">E-Commerce Design</li>
            <li class="project-item">Blog Template</li>
        </ul>
    </section>

    <section class="contact">
        <h2>★ Contact Me</h2>
        <form>
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Enter your name">

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email">

            <input type="submit" value="Send Message">
        </form>
    </section>

    <footer>
        <p>© Virtual University of Pakistan</p>
    </footer>

</body>
</html>
